name: Publish to npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build platform-specific binaries in parallel
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14        # Apple Silicon runner
          - target: darwin-x64
            os: macos-13        # Intel runner
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: linux-x64
            os: ubuntu-24.04

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary for ${{ matrix.target }}
        run: bun run build:npm -- ${{ matrix.target }}
        working-directory: app/cli

      - name: Verify binary
        run: |
          BINARY="app/npm/gubbi-${{ matrix.target }}/bin/gubbi"
          if [ ! -f "$BINARY" ]; then
            echo "Error: Binary not found at $BINARY"
            exit 1
          fi
          if [ ! -x "$BINARY" ]; then
            echo "Error: Binary is not executable"
            exit 1
          fi
          echo "Binary verification successful"
          ls -lh "$BINARY"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gubbi-${{ matrix.target }}
          path: |
            app/npm/gubbi-${{ matrix.target }}/bin/gubbi
            app/npm/gubbi-${{ matrix.target }}/bin/gubbi.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release and attach platform binaries as assets
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04

    permissions:
      contents: write  # required to create releases and upload assets

    steps:
      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-darwin-arm64
          path: artifacts/darwin-arm64

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-darwin-x64
          path: artifacts/darwin-x64

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-linux-arm64
          path: artifacts/linux-arm64

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-linux-x64
          path: artifacts/linux-x64

      - name: Set binary permissions
        run: |
          chmod +x artifacts/darwin-arm64/gubbi
          chmod +x artifacts/darwin-x64/gubbi
          chmod +x artifacts/linux-arm64/gubbi
          chmod +x artifacts/linux-x64/gubbi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/darwin-arm64/gubbi
            artifacts/darwin-arm64/gubbi.sha256
            artifacts/darwin-x64/gubbi
            artifacts/darwin-x64/gubbi.sha256
            artifacts/linux-arm64/gubbi
            artifacts/linux-arm64/gubbi.sha256
            artifacts/linux-x64/gubbi
            artifacts/linux-x64/gubbi.sha256
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Publish all packages to npm
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to npm
    needs: [build, release]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      # Extract version from tag (v1.2.3 → 1.2.3)
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Sync all package.json versions to match the git tag
      - name: Sync package versions
        run: bun run scripts/version.ts ${{ steps.version.outputs.version }}

      # Run pre-publish validation (skip tests as they should run in a separate job)
      - name: Pre-publish validation
        run: bun run pre-publish -- --skip-tests

      # Download all platform binaries built in the previous job
      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-darwin-arm64
          path: app/npm/gubbi-darwin-arm64/bin

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-darwin-x64
          path: app/npm/gubbi-darwin-x64/bin

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-linux-arm64
          path: app/npm/gubbi-linux-arm64/bin

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: gubbi-linux-x64
          path: app/npm/gubbi-linux-x64/bin

      # Ensure all binaries are executable after download
      - name: Set binary permissions
        run: |
          chmod +x app/npm/gubbi-darwin-arm64/bin/gubbi
          chmod +x app/npm/gubbi-darwin-x64/bin/gubbi
          chmod +x app/npm/gubbi-linux-arm64/bin/gubbi
          chmod +x app/npm/gubbi-linux-x64/bin/gubbi

      # Publish platform packages first so they exist when the main package
      # resolves its optionalDependencies
      - name: Publish gubbi-darwin-arm64
        run: npm publish --provenance --access public
        working-directory: app/npm/gubbi-darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish gubbi-darwin-x64
        run: npm publish --provenance --access public
        working-directory: app/npm/gubbi-darwin-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish gubbi-linux-arm64
        run: npm publish --provenance --access public
        working-directory: app/npm/gubbi-linux-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish gubbi-linux-x64
        run: npm publish --provenance --access public
        working-directory: app/npm/gubbi-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main wrapper package last
      - name: Publish gubbi
        run: npm publish --provenance --access public
        working-directory: app/npm/gubbi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
